<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian TriColour Flag</title>
    <style>
        .seg {
            width:600px;
            height:150px;
            display:flex;
            justify-content: center;
        }
        .red {
            background-color: red;
        }
        .white{
            background-color: white;
        }
        .green{
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="seg red"></div>
    <div class="seg white"><img src="ashokachakra.png" alt="Ashoka Chakra"></div>
    <div class="seg green"></div>
</body>
</html>
